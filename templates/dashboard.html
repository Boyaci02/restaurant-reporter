<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Reporter – Admin</title>
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <link rel="stylesheet" href="/styles/admin.css" />
</head>
<body class="app">

<header class="header">
  <div class="header__brand">
    <div class="header__icon" aria-hidden="true">🍽</div>
    <span class="header__title">Restaurant Reporter<span class="header__sub">Admin</span></span>
  </div>
  <a href="/logout" class="btn btn--ghost" style="height:36px;font-size:13px;" aria-label="Logga ut">Logga ut</a>
</header>

<main class="main">
  <div class="container">

    <!-- Controls -->
    <div class="controls">
      <div class="controls__search">
        <svg class="controls__search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="8.5" cy="8.5" r="5.5"/><path d="m13 13 3.5 3.5"/>
        </svg>
        <input class="input input--search" id="search" type="search"
          placeholder="Sök kund eller e-post…" aria-label="Sök kund" />
      </div>
      <select class="select" id="filter" aria-label="Filtrera på aktiv-status">
        <option value="all">Alla kunder</option>
        <option value="active">Aktiva</option>
        <option value="inactive">Inaktiva</option>
      </select>
      <div class="controls__cta">
        <button class="btn btn--primary" onclick="openModal()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true">
            <path d="M6 0v12M0 6h12"/>
          </svg>
          Lägg till kund
        </button>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary">
      <span class="summary__text" id="meta-count"></span>
      <div class="legend" role="note" aria-label="Förklaring av statusfärger">
        <span class="legend__item"><span class="legend__dot" style="background:var(--success-fg)"></span>Levererad</span>
        <span class="legend__item"><span class="legend__dot" style="background:var(--danger-fg)"></span>Misslyckad</span>
        <span class="legend__item"><span class="legend__dot" style="background:var(--warning-fg)"></span>Väntar</span>
        <span class="legend__item"><span class="legend__dot" style="background:var(--muted)"></span>Framtida</span>
      </div>
    </div>

    <!-- Status filter chips -->
    <div class="chips" role="group" aria-label="Filtrera på leveransstatus">
      <button class="chip active" data-status="all"     onclick="setStatusFilter('all')">Alla</button>
      <button class="chip"        data-status="ok"      onclick="setStatusFilter('ok')">
        <span class="chip__dot" style="background:var(--success-fg)"></span>Levererad
      </button>
      <button class="chip"        data-status="fail"    onclick="setStatusFilter('fail')">
        <span class="chip__dot" style="background:var(--danger-fg)"></span>Misslyckad
      </button>
      <button class="chip"        data-status="pending" onclick="setStatusFilter('pending')">
        <span class="chip__dot" style="background:var(--warning-fg)"></span>Väntar
      </button>
      <button class="chip"        data-status="future"  onclick="setStatusFilter('future')">
        <span class="chip__dot" style="background:var(--muted)"></span>Framtida
      </button>
    </div>

    <!-- Table card -->
    <div class="card table-card">
      <table class="table" id="tbl" aria-label="Kundöversikt">
        <thead>
          <tr>
            <th class="th--sortable" id="th-name" onclick="sortByName()" aria-sort="none">Kund</th>
            <th class="col-hide-sm">E-post</th>
            <th>Status</th>
            <th id="h0" class="th--center"></th>
            <th id="h1" class="th--center"></th>
            <th id="h2" class="th--center"></th>
            <th id="h3" class="th--center col-hide-md"></th>
            <th id="h4" class="th--center col-hide-md"></th>
            <th id="h5" class="th--center col-hide-md"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state" role="status">
        <div class="empty-state__title">Inga kunder matchar</div>
        <div class="empty-state__desc">Prova ett annat sökord eller återställ filtret.</div>
      </div>
    </div>

  </div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="dialog" id="dialog">
    <div class="dialog__header">
      <div>
        <h2 class="dialog__title" id="modal-title">Lägg till kund</h2>
        <div class="dialog__step" id="step-label">Steg 1 av 2 — Välj Metricool-konto</div>
      </div>
      <button class="btn--icon" onclick="closeModal()" aria-label="Stäng dialog">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M2 2l12 12M14 2L2 14"/>
        </svg>
      </button>
    </div>

    <div class="dialog__progress" aria-hidden="true">
      <div class="dialog__progress-bar" id="progress-bar" style="width:50%"></div>
    </div>

    <!-- Step 1: choose Metricool account -->
    <div class="dialog__body" id="step1">
      <input class="input" id="brand-search" type="search"
        placeholder="Sök Metricool-konto…" aria-label="Sök Metricool-konton" oninput="filterBrands()" />
      <div class="brand-list" id="brand-list" role="listbox" aria-label="Metricool-konton">
        <div class="brand-loading">Hämtar konton från Metricool…</div>
      </div>
    </div>

    <!-- Step 2: contact details -->
    <div class="dialog__body" id="step2" style="display:none">
      <div class="selected-brand-card">
        <div>
          <div class="selected-brand-card__name" id="sbi-name"></div>
          <div class="selected-brand-card__id"   id="sbi-id"></div>
        </div>
      </div>
      <div class="field">
        <label class="field__label" for="f-name">Restaurangens namn</label>
        <input class="input" id="f-name" readonly />
      </div>
      <div class="field">
        <label class="field__label" for="f-email">
          Kontakt-e-post <span style="color:var(--muted);font-weight:400;text-transform:none">*</span>
        </label>
        <input class="input" id="f-email" type="email" placeholder="info@restaurangen.se" />
      </div>
      <div class="field">
        <label class="field__label" for="f-plausible">
          Plausible-domän <span style="color:var(--muted);font-weight:400;text-transform:none">(valfri)</span>
        </label>
        <input class="input" id="f-plausible" placeholder="restaurangen.se" />
        <div class="field__hint">Lämna tomt om Plausible inte används</div>
      </div>
      <div class="field__error" id="modal-err"></div>
    </div>

    <div class="dialog__footer" id="modal-footer-1">
      <button class="btn btn--secondary" onclick="closeModal()">Avbryt</button>
      <button class="btn btn--primary" id="btn-next" onclick="goToStep2()" disabled>Välj detta konto</button>
    </div>
    <div class="dialog__footer" id="modal-footer-2" style="display:none">
      <button class="btn btn--secondary" onclick="goToStep1()">← Tillbaka</button>
      <button class="btn btn--primary" onclick="addCustomer()">Spara kund</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<script>
const MONTH_SV = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

let allCustomers  = [];
let months        = [];
let logs          = {};
let allBrands     = [];
let selectedBrand = null;
let sortAsc       = true;
let statusFilter  = 'all';

async function load() {
  const [custRes, statusRes] = await Promise.all([
    fetch('/api/customers'), fetch('/api/status')
  ]);
  allCustomers = await custRes.json();
  const status = await statusRes.json();
  months = status.months;
  logs   = status.logs;
  renderAll();
}

/* Return the most-recent-month delivery status for a customer */
function getCustomerStatus(customerId) {
  if (!months.length) return 'future';
  const m   = months[0];
  const now = new Date();
  const isFuture = m.year > now.getFullYear() ||
    (m.year === now.getFullYear() && m.month > now.getMonth() + 1);
  const delivered = logs[m.key]?.delivered ?? [];
  const failed    = logs[m.key]?.failed    ?? [];
  if (delivered.includes(customerId)) return 'ok';
  if (failed.includes(customerId))    return 'fail';
  if (isFuture)                       return 'future';
  return 'pending';
}

function getFiltered() {
  const q      = document.getElementById('search').value.trim().toLowerCase();
  const filter = document.getElementById('filter').value;
  return allCustomers.filter(c => {
    const matchSearch = !q ||
      c.name.toLowerCase().includes(q) ||
      (c.contact_email || '').toLowerCase().includes(q);
    const matchFilter =
      filter === 'all' ||
      (filter === 'active'   &&  c.active) ||
      (filter === 'inactive' && !c.active);
    const matchStatus =
      statusFilter === 'all' || getCustomerStatus(c.id) === statusFilter;
    return matchSearch && matchFilter && matchStatus;
  });
}

function renderAll() {
  months.forEach((m, i) => {
    document.getElementById('h' + i).textContent = `${MONTH_SV[m.month-1]} ${m.year}`;
  });

  const activeCount = allCustomers.filter(c => c.active).length;
  document.getElementById('meta-count').innerHTML =
    `<strong>${allCustomers.length}</strong> kunder &nbsp;·&nbsp; <strong>${activeCount}</strong> aktiva`;

  const customers = getFiltered();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const empty = document.getElementById('empty-state');
  if (customers.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  customers.forEach(c => {
    const tr = document.createElement('tr');
    const id = esc(c.id);

    /* Customer name + slug */
    tr.innerHTML += `<td>
      <div class="customer__name">${esc(c.name)}</div>
      <div class="customer__slug">${esc(c.id)}</div>
    </td>`;

    /* Email inline edit */
    tr.innerHTML += `<td class="col-hide-sm">
      <div class="email-cell">
        <span class="email-cell__text" id="et-${id}">${esc(c.contact_email || '—')}</span>
        <button class="btn--icon email-cell__edit" onclick="startEditEmail('${id}')"
          aria-label="Redigera e-post för ${esc(c.name)}">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M11 2l3 3-8 8H3v-3l8-8z"/>
          </svg>
        </button>
        <input class="email-cell__input" id="ei-${id}" value="${esc(c.contact_email || '')}"
          onkeydown="if(event.key==='Enter')saveEmail('${id}');if(event.key==='Escape')cancelEditEmail('${id}')"
          onblur="saveEmail('${id}')"
          aria-label="E-post för ${esc(c.name)}" />
        <button class="email-cell__save" id="es-${id}" onclick="saveEmail('${id}')">Spara</button>
      </div>
    </td>`;

    /* Active toggle */
    tr.innerHTML += `<td>
      <button class="toggle-pill ${c.active ? 'toggle-pill--on' : 'toggle-pill--off'}"
        data-id="${id}" data-active="${c.active}"
        onclick="toggleActive(this)"
        aria-pressed="${c.active}"
        aria-label="${c.active ? 'Aktiv – klicka för att inaktivera' : 'Inaktiv – klicka för att aktivera'}">
        <span class="toggle-pill__dot"></span>${c.active ? 'Aktiv' : 'Inaktiv'}
      </button>
    </td>`;

    /* Monthly status badges */
    months.forEach((m, i) => {
      const delivered = logs[m.key]?.delivered ?? [];
      const failed    = logs[m.key]?.failed    ?? [];
      const now = new Date();
      const isFuture = m.year > now.getFullYear() ||
        (m.year === now.getFullYear() && m.month > now.getMonth() + 1);

      const colCls = i >= 3 ? 'td--center col-hide-md' : 'td--center';
      let cell;
      if (delivered.includes(c.id)) {
        cell = `<span class="badge badge--ok" role="status" aria-label="Levererad"><span class="badge__dot"></span>Klar</span>`;
      } else if (failed.includes(c.id)) {
        cell = `<span class="badge badge--fail" role="status" aria-label="Misslyckad"><span class="badge__dot"></span>Fel</span>`;
      } else if (isFuture) {
        cell = `<span class="badge badge--future" role="status" aria-label="Framtida">—</span>`;
      } else {
        cell = `<span class="badge badge--pending" role="status" aria-label="Väntar"><span class="badge__dot"></span>Väntar</span>`;
      }
      tr.innerHTML += `<td class="${colCls}">${cell}</td>`;
    });

    tbody.appendChild(tr);
  });
}

/* ── Sorting ─────────────────────────────────── */
function sortByName() {
  sortAsc = !sortAsc;
  allCustomers.sort((a, b) =>
    sortAsc ? a.name.localeCompare(b.name, 'sv') : b.name.localeCompare(a.name, 'sv')
  );
  document.getElementById('th-name').setAttribute('aria-sort', sortAsc ? 'ascending' : 'descending');
  renderAll();
}

/* ── Status chip filter ──────────────────────── */
function setStatusFilter(status) {
  statusFilter = status;
  document.querySelectorAll('.chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.status === status);
  });
  renderAll();
}

/* ── Inline email edit ───────────────────────── */
function startEditEmail(id) {
  document.getElementById('et-' + id).style.display = 'none';
  const input = document.getElementById('ei-' + id);
  input.style.display = 'block';
  document.getElementById('es-' + id).style.display = 'block';
  input.focus(); input.select();
}

function cancelEditEmail(id) {
  const c = allCustomers.find(c => c.id === id);
  document.getElementById('ei-' + id).value = c?.contact_email || '';
  document.getElementById('ei-' + id).style.display = 'none';
  document.getElementById('es-' + id).style.display = 'none';
  document.getElementById('et-' + id).style.display = '';
}

async function saveEmail(id) {
  const input = document.getElementById('ei-' + id);
  if (input.style.display === 'none') return;
  input.style.display = 'none';
  document.getElementById('es-' + id).style.display = 'none';
  document.getElementById('et-' + id).style.display = '';
  const email = input.value.trim();
  const res = await fetch(`/api/customers/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contact_email: email })
  });
  if (res.ok) {
    const c = allCustomers.find(c => c.id === id);
    if (c) c.contact_email = email;
    document.getElementById('et-' + id).textContent = email || '—';
    toast('E-post sparad');
  } else {
    toast('Kunde inte spara e-post', true);
  }
}

/* ── Active toggle ───────────────────────────── */
async function toggleActive(btn) {
  const id     = btn.dataset.id;
  const active = btn.dataset.active !== 'true';
  const res = await fetch(`/api/customers/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ active })
  });
  if (res.ok) {
    const c = allCustomers.find(c => c.id === id);
    if (c) c.active = active;
    btn.dataset.active = String(active);
    btn.className = 'toggle-pill ' + (active ? 'toggle-pill--on' : 'toggle-pill--off');
    btn.setAttribute('aria-pressed', String(active));
    btn.setAttribute('aria-label', active ? 'Aktiv – klicka för att inaktivera' : 'Inaktiv – klicka för att aktivera');
    btn.innerHTML = `<span class="toggle-pill__dot"></span>${active ? 'Aktiv' : 'Inaktiv'}`;
    renderAll();
    toast(active ? 'Kund aktiverad' : 'Kund inaktiverad');
  } else {
    toast('Kunde inte uppdatera', true);
  }
}

/* ── Modal ───────────────────────────────────── */
function onModalKeydown(event) {
  if (event.key === 'Escape') { closeModal(); return; }
  if (event.key !== 'Tab') return;
  const focusable = document.getElementById('dialog').querySelectorAll(
    'button:not([disabled]), input:not([disabled]), select, [tabindex]:not([tabindex="-1"])'
  );
  const first = focusable[0];
  const last  = focusable[focusable.length - 1];
  if (event.shiftKey) {
    if (document.activeElement === first) { event.preventDefault(); last.focus(); }
  } else {
    if (document.activeElement === last)  { event.preventDefault(); first.focus(); }
  }
}

function openModal() {
  selectedBrand = null;
  document.getElementById('overlay').classList.add('open');
  document.addEventListener('keydown', onModalKeydown);
  goToStep1();
  fetchBrands();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.removeEventListener('keydown', onModalKeydown);
  document.getElementById('f-email').value    = '';
  document.getElementById('f-plausible').value = '';
  document.getElementById('modal-err').style.display = 'none';
  document.getElementById('brand-search').value = '';
}

function goToStep1() {
  document.getElementById('step1').style.display         = '';
  document.getElementById('step2').style.display         = 'none';
  document.getElementById('modal-footer-1').style.display = '';
  document.getElementById('modal-footer-2').style.display = 'none';
  document.getElementById('step-label').textContent      = 'Steg 1 av 2 — Välj Metricool-konto';
  document.getElementById('progress-bar').style.width    = '50%';
  selectedBrand = null;
  document.getElementById('btn-next').disabled = true;
  filterBrands();
  document.getElementById('brand-search').focus();
}

function goToStep2() {
  if (!selectedBrand) return;
  document.getElementById('step1').style.display         = 'none';
  document.getElementById('step2').style.display         = '';
  document.getElementById('modal-footer-1').style.display = 'none';
  document.getElementById('modal-footer-2').style.display = '';
  document.getElementById('step-label').textContent      = 'Steg 2 av 2 — Kontaktuppgifter';
  document.getElementById('progress-bar').style.width    = '100%';
  document.getElementById('sbi-name').textContent = selectedBrand.label;
  document.getElementById('sbi-id').textContent   = `Brand ID: ${selectedBrand.id}`;
  document.getElementById('f-name').value         = selectedBrand.label;
  document.getElementById('f-email').focus();
}

/* ── Brand browser ───────────────────────────── */
async function fetchBrands() {
  const list = document.getElementById('brand-list');
  list.innerHTML = '<div class="brand-loading">Hämtar konton från Metricool…</div>';
  try {
    const res = await fetch('/api/metricool/brands');
    allBrands = await res.json();
    renderBrands(allBrands);
  } catch {
    list.innerHTML = '<div class="brand-loading">Kunde inte hämta konton. Försök igen.</div>';
  }
}

function filterBrands() {
  const q = document.getElementById('brand-search').value.trim().toLowerCase();
  renderBrands(q ? allBrands.filter(b => b.label.toLowerCase().includes(q)) : allBrands);
}

const NET_ICONS = {
  instagram: '📷', facebook: '👤', tiktok: '🎵',
  linkedin: '💼', youtube: '▶️', google: '📍'
};

function renderBrands(brands) {
  const list = document.getElementById('brand-list');
  if (!brands.length) {
    list.innerHTML = '<div class="brand-loading">Inga konton hittades</div>';
    return;
  }
  list.innerHTML = brands.map(b => {
    const nets = Object.entries(NET_ICONS)
      .filter(([k]) => b[k])
      .map(([, icon]) => `<span class="brand-item__net-icon" aria-hidden="true">${icon}</span>`)
      .join('');
    const cls = b.already_added ? 'brand-item brand-item--added' : 'brand-item';
    return `<div class="${cls}" role="option"
      data-id="${esc(b.id)}" onclick="selectBrand('${esc(b.id)}')"
      aria-selected="false" ${b.already_added ? 'aria-disabled="true"' : ''}>
      <span class="brand-item__name">${esc(b.label)}</span>
      <span class="brand-item__nets">${nets}</span>
      ${b.already_added ? '<span class="brand-item__badge">Tillagd</span>' : ''}
    </div>`;
  }).join('');
}

function selectBrand(id) {
  const brand = allBrands.find(b => b.id === id);
  if (!brand || brand.already_added) return;
  selectedBrand = brand;
  document.querySelectorAll('.brand-item').forEach(el => {
    const sel = el.dataset.id === id;
    el.classList.toggle('brand-item--selected', sel);
    el.setAttribute('aria-selected', String(sel));
  });
  document.getElementById('btn-next').disabled = false;
}

/* ── Add customer ────────────────────────────── */
async function addCustomer() {
  const errEl = document.getElementById('modal-err');
  if (!selectedBrand) return;
  const body = {
    name:             document.getElementById('f-name').value.trim(),
    contact_email:    document.getElementById('f-email').value.trim(),
    brand_id:         selectedBrand.id,
    location_id:      selectedBrand.location_id || '',
    plausible_domain: document.getElementById('f-plausible').value.trim(),
  };
  const res = await fetch('/api/customers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (res.ok) {
    closeModal();
    toast('Kund tillagd');
    await load();
  } else {
    const err = await res.json();
    errEl.textContent = err.error;
    errEl.style.display = 'block';
  }
}

/* ── Toast ───────────────────────────────────── */
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' toast--error' : '');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

/* ── XSS escape ──────────────────────────────── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Event listeners ─────────────────────────── */
document.getElementById('search').addEventListener('input',  renderAll);
document.getElementById('filter').addEventListener('change', renderAll);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

load();
</script>
</body>
</html>
