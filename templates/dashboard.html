<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Reporter – Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 32px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header .logo { font-size: 16px; font-weight: 700; color: #f8fafc; }
    header .logo span { color: #6366f1; }
    header a { font-size: 13px; color: #64748b; text-decoration: none; }
    header a:hover { color: #94a3b8; }

    /* ── Main ── */
    main { padding: 32px; max-width: 1400px; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .top-bar h1 { font-size: 20px; font-weight: 600; color: #f8fafc; }
    .top-bar .count { font-size: 13px; color: #64748b; margin-left: 10px; }

    button.primary {
      background: #6366f1; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      padding: 8px 16px; cursor: pointer;
      transition: background .15s;
    }
    button.primary:hover { background: #4f46e5; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #1e293b;
      color: #64748b; font-weight: 600;
      padding: 10px 14px; text-align: left;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #1e293b; }
    tbody tr:hover { background: #1e293b55; }
    tbody td { padding: 10px 14px; vertical-align: middle; }

    .customer-name { font-weight: 600; color: #f8fafc; }
    .customer-id   { font-size: 11px; color: #475569; }

    /* Inline email edit */
    .email-cell { display: flex; align-items: center; gap: 6px; }
    .email-input {
      background: transparent; border: 1px solid transparent;
      border-radius: 6px; color: #cbd5e1;
      font-size: 13px; padding: 4px 8px;
      width: 220px; outline: none;
      transition: border-color .15s, background .15s;
    }
    .email-input:hover { border-color: #334155; }
    .email-input:focus { border-color: #6366f1; background: #0f172a; }
    .save-btn {
      font-size: 11px; padding: 3px 8px;
      background: #22c55e; color: #fff;
      border: none; border-radius: 5px;
      cursor: pointer; display: none;
    }
    .save-btn:hover { background: #16a34a; }

    /* Active toggle */
    .toggle { position: relative; width: 36px; height: 20px; display: inline-block; }
    .toggle input { display: none; }
    .slider {
      position: absolute; inset: 0;
      background: #334155; border-radius: 20px; cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 14px; height: 14px; background: #fff; border-radius: 50%;
      left: 3px; top: 3px; transition: transform .2s;
    }
    .toggle input:checked + .slider { background: #6366f1; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }

    /* Status pills */
    .pill {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 22px; border-radius: 6px; font-size: 14px;
    }
    .pill.ok       { background: #14532d44; }
    .pill.fail     { background: #7f1d1d44; }
    .pill.pending  { background: #1e293b; color: #475569; font-size: 11px; font-weight: 600; }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: #00000088; z-index: 100;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 32px; width: 420px;
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 5px; }
    .field input {
      width: 100%; background: #0f172a;
      border: 1px solid #334155; border-radius: 7px;
      color: #f8fafc; font-size: 13px; padding: 8px 12px; outline: none;
    }
    .field input:focus { border-color: #6366f1; }
    .field .hint { font-size: 11px; color: #475569; margin-top: 4px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
    button.secondary {
      background: #334155; color: #e2e8f0;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      padding: 8px 16px; cursor: pointer;
    }
    button.secondary:hover { background: #475569; }
    .modal-error { font-size: 12px; color: #f87171; margin-top: 8px; display: none; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #22c55e; color: #fff;
      border-radius: 8px; padding: 10px 18px;
      font-size: 13px; font-weight: 600;
      display: none; z-index: 200;
    }
    #toast.error { background: #ef4444; }
  </style>
</head>
<body>

<header>
  <div class="logo">Restaurant <span>Reporter</span> &mdash; Admin</div>
  <a href="/logout">Logga ut</a>
</header>

<main>
  <div class="top-bar">
    <div>
      <h1 style="display:inline">Kunder</h1>
      <span class="count" id="count"></span>
    </div>
    <button class="primary" onclick="openModal()">+ Lägg till kund</button>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th>Kund</th>
          <th>E-post</th>
          <th>Aktiv</th>
          <th id="h0"></th>
          <th id="h1"></th>
          <th id="h2"></th>
          <th id="h3"></th>
          <th id="h4"></th>
          <th id="h5"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<!-- Add customer modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Lägg till kund</h2>
    <div class="field">
      <label>Restaurangens namn *</label>
      <input id="f-name" placeholder="Pizzeria Roma" />
    </div>
    <div class="field">
      <label>Kontakt-e-post *</label>
      <input id="f-email" type="email" placeholder="info@pizzeriaroma.se" />
    </div>
    <div class="field">
      <label>Metricool Brand ID *</label>
      <input id="f-brand" placeholder="6012345" />
      <div class="hint">Finns i Metricool under kontoinställningar</div>
    </div>
    <div class="field">
      <label>Google location_id</label>
      <input id="f-google" placeholder="locations/123456789" />
    </div>
    <div class="field">
      <label>Plausible-domän</label>
      <input id="f-plausible" placeholder="restaurangen.se" />
    </div>
    <div class="modal-error" id="modal-err"></div>
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal()">Avbryt</button>
      <button class="primary" onclick="addCustomer()">Spara kund</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const MONTH_SV = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

let months = [], logs = {};

async function load() {
  const [custRes, statusRes] = await Promise.all([
    fetch('/api/customers'), fetch('/api/status')
  ]);
  const customers = await custRes.json();
  const status    = await statusRes.json();
  months = status.months;
  logs   = status.logs;
  render(customers);
}

function render(customers) {
  document.getElementById('count').textContent = `(${customers.length} aktiva)`;

  // Month headers
  months.forEach((m, i) => {
    document.getElementById('h' + i).textContent = `${MONTH_SV[m.month-1]} ${m.year}`;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  customers.forEach(c => {
    const tr = document.createElement('tr');

    // Name + id
    tr.innerHTML += `<td>
      <div class="customer-name">${esc(c.name)}</div>
      <div class="customer-id">${esc(c.id)}</div>
    </td>`;

    // Email (inline edit)
    tr.innerHTML += `<td>
      <div class="email-cell">
        <input class="email-input" data-id="${esc(c.id)}" value="${esc(c.contact_email || '')}"
          oninput="showSave(this)" onkeydown="if(event.key==='Enter')saveEmail(this)"
          onblur="saveEmail(this)" />
        <button class="save-btn" onclick="saveEmail(this.previousElementSibling)">Spara</button>
      </div>
    </td>`;

    // Active toggle
    tr.innerHTML += `<td>
      <label class="toggle">
        <input type="checkbox" data-id="${esc(c.id)}" ${c.active ? 'checked' : ''}
          onchange="toggleActive(this)" />
        <span class="slider"></span>
      </label>
    </td>`;

    // Status columns (last 6 months)
    months.forEach(m => {
      const delivered = logs[m.key]?.delivered ?? [];
      const failed    = logs[m.key]?.failed    ?? [];
      const now = new Date();
      const isFuture = m.year > now.getFullYear() ||
        (m.year === now.getFullYear() && m.month > now.getMonth() + 1);

      let pill;
      if (delivered.includes(c.id)) {
        pill = `<span class="pill ok" title="Levererad">✅</span>`;
      } else if (failed.includes(c.id)) {
        pill = `<span class="pill fail" title="Misslyckad">❌</span>`;
      } else if (isFuture) {
        pill = `<span class="pill pending" title="Framtida">—</span>`;
      } else {
        pill = `<span class="pill pending" title="Ej skickad">⏳</span>`;
      }
      tr.innerHTML += `<td style="text-align:center">${pill}</td>`;
    });

    tbody.appendChild(tr);
  });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function showSave(input) {
  input.nextElementSibling.style.display = 'inline-block';
}

async function saveEmail(input) {
  const btn = input.nextElementSibling;
  if (btn.style.display === 'none') return; // no change
  btn.style.display = 'none';
  const id = input.dataset.id;
  const email = input.value.trim();
  const res = await fetch(`/api/customers/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contact_email: email })
  });
  if (res.ok) toast('E-post sparad');
  else toast('Kunde inte spara', true);
}

async function toggleActive(checkbox) {
  const id = checkbox.dataset.id;
  const res = await fetch(`/api/customers/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ active: checkbox.checked })
  });
  if (res.ok) toast(checkbox.checked ? 'Kund aktiverad' : 'Kund inaktiverad');
  else toast('Kunde inte uppdatera', true);
}

function openModal() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-name').focus();
  document.getElementById('modal-err').style.display = 'none';
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  ['f-name','f-email','f-brand','f-google','f-plausible'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

async function addCustomer() {
  const errEl = document.getElementById('modal-err');
  const body = {
    name:            document.getElementById('f-name').value.trim(),
    contact_email:   document.getElementById('f-email').value.trim(),
    brand_id:        document.getElementById('f-brand').value.trim(),
    location_id:     document.getElementById('f-google').value.trim(),
    plausible_domain: document.getElementById('f-plausible').value.trim(),
  };
  const res = await fetch('/api/customers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (res.ok) {
    closeModal();
    toast('Kund tillagd');
    load();
  } else {
    const err = await res.json();
    errEl.textContent = err.error;
    errEl.style.display = 'block';
  }
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

load();
</script>
</body>
</html>
